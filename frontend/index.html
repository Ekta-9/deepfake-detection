<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepFake Detector — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="auth" class="min-h-screen flex items-center justify-center p-4 text-white">

  <!-- Neural network canvas -->
  <canvas id="neural-bg"></canvas>

  <!-- Ambient orbs -->
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>

  <div class="w-full max-w-md z-top">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4"
        style="background: linear-gradient(135deg, #e2e8f0, #94a3b8); box-shadow: 0 0 32px rgba(226,232,240,0.22);">
        <svg class="w-7 h-7 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">DeepFake Detector</h1>
      <p class="text-zinc-500 text-sm mt-1">Verify image authenticity with AI</p>
    </div>

    <!-- Card -->
    <div class="glass-card rounded-2xl overflow-hidden">

      <!-- Tabs -->
      <div class="flex border-b border-white/8">
        <button id="login-tab"
          class="flex-1 py-4 text-sm font-medium text-slate-300 border-b-2 border-slate-400 transition-colors">
          Sign In
        </button>
        <button id="register-tab"
          class="flex-1 py-4 text-sm font-medium text-zinc-500 border-b-2 border-transparent hover:text-zinc-300 transition-colors">
          Register
        </button>
      </div>

      <div class="p-8">
        <!-- Error -->
        <p id="auth-error" class="text-red-400 text-sm mb-4 min-h-[20px]"></p>

        <!-- Login form -->
        <form id="login-form">
          <div class="mb-4">
            <label class="block text-zinc-500 text-xs font-semibold mb-2 uppercase tracking-wider">Email</label>
            <input id="login-email" type="email" required placeholder="you@example.com"
              class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-zinc-600 focus:outline-none focus:border-slate-400/60 transition-colors">
          </div>
          <div class="mb-6">
            <label class="block text-zinc-500 text-xs font-semibold mb-2 uppercase tracking-wider">Password</label>
            <input id="login-password" type="password" required placeholder="••••••••"
              class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-zinc-600 focus:outline-none focus:border-slate-400/60 transition-colors">
          </div>
          <button type="submit" class="btn-primary w-full py-3 rounded-lg">
            Sign In
          </button>
        </form>

        <!-- Register form -->
        <form id="register-form" class="hidden">
          <div class="mb-4">
            <label class="block text-zinc-500 text-xs font-semibold mb-2 uppercase tracking-wider">Email</label>
            <input id="reg-email" type="email" required placeholder="you@example.com"
              class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-zinc-600 focus:outline-none focus:border-slate-400/60 transition-colors">
          </div>
          <div class="mb-6">
            <label class="block text-zinc-500 text-xs font-semibold mb-2 uppercase tracking-wider">Password</label>
            <input id="reg-password" type="password" required placeholder="••••••••"
              class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-zinc-600 focus:outline-none focus:border-slate-400/60 transition-colors">
          </div>
          <button type="submit" class="btn-primary w-full py-3 rounded-lg">
            Create Account
          </button>
        </form>
      </div>

    </div>

    <p class="text-center text-zinc-700 text-xs mt-6">Powered by ResNet50 · GradCAM explainability</p>
  </div>

  <script src="main.js"></script>
  <script src="neural-bg.js"></script>
</body>
</html>
